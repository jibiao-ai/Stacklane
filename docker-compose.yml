version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: stacklane-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Root@Stack2026!
      MYSQL_DATABASE: stacklane
      MYSQL_USER: stacklane
      MYSQL_PASSWORD: Stack@Db2026!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stacklane-redis
    command: redis-server --requirepass "Redis@Stack2026!"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stacklane-backend
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: stacklane
      DB_PASSWORD: Stack@Db2026!
      DB_NAME: stacklane
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: Redis@Stack2026!
      JWT_SECRET: Jwt@Stacklane#Secret2026!
      SERVER_PORT: "8080"
      GPUSTACK_URL: ${GPUSTACK_URL:-}
      GPUSTACK_API_KEY: ${GPUSTACK_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stacklane-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: stacklane-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: stacklane-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: Grafana@Stack2026!
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: stacklane-node-exporter
    ports:
      - "9100:9100"

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
