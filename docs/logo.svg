<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E71FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1050E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  
  <!-- Stacklane Logo: Two horizontal bars with interlocking chain-link center -->
  <!-- Flat filled polygon approach for pixel-perfect rendering -->
  
  <g fill="white">
    <!-- ===== TOP BAR (left segment) ===== -->
    <path d="M 88 180 L 190 180 L 190 212 L 88 212 Z"/>
    
    <!-- ===== TOP BAR (right segment) ===== -->
    <path d="M 322 180 L 424 180 L 424 212 L 322 212 Z"/>
    
    <!-- ===== BOTTOM BAR (left segment) ===== -->
    <path d="M 88 300 L 190 300 L 190 332 L 88 332 Z"/>
    
    <!-- ===== BOTTOM BAR (right segment) ===== -->
    <path d="M 322 300 L 424 300 L 424 332 L 322 332 Z"/>
    
    <!-- ===== CENTER INTERLOCKING PATTERN ===== -->
    <!-- Top lane: from left bar → diagonal down-right → diagonal up-right → to right bar -->
    <!-- This creates a V shape pointing down -->
    <path d="M 178 180 L 202 180 L 258 236 L 310 180 L 334 180 L 270 248 L 256 248 L 242 248 Z"/>
    
    <!-- Bottom lane: from left bar → diagonal up-right → diagonal down-right → to right bar -->
    <!-- This creates a V shape pointing up -->
    <path d="M 178 332 L 202 332 L 258 276 L 310 332 L 334 332 L 270 264 L 256 264 L 242 264 Z"/>
  </g>
  
  <!-- Create the interlocking/weave by cutting through -->
  <!-- Left crossing: bottom lane passes behind top lane -->
  <path d="M 215 268 L 233 250 L 221 238 L 203 256 Z" fill="url(#bg)"/>
  
  <!-- Right crossing: top lane passes behind bottom lane -->
  <path d="M 279 244 L 297 262 L 309 250 L 291 232 Z" fill="url(#bg)"/>
</svg>
